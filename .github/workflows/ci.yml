name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  WASM_SIZE_MAX_BYTES: 2621440

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustup honors rust-toolchain.toml, installing the pinned stable
      # (channel + rustfmt/clippy components) automatically.
      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

      - name: Build without default features
        run: cargo build -p rizzma --no-default-features

      - name: Wasm check
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check --workspace --exclude xtask --target wasm32-unknown-unknown

      # Doc consistency: render the gallery, then verify every `gallery_*.png`
      # referenced in the README / doc comments is actually produced by the
      # gallery example (catches typo'd or stale image URLs).
      - name: Render gallery
        run: cargo run -p rizzma --example gallery

      - name: Check gallery doc links
        run: cargo xtask check-gallery-links --strict

      # Broken intra-doc links (and other rustdoc warnings) fail the build.
      - name: Docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  wasm-size:
    name: wasm size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustup honors rust-toolchain.toml, installing the pinned stable
      # toolchain automatically.
      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version

      - uses: Swatinem/rust-cache@v2

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Check wasm size budget
        run: |
          cargo build -p rizzma --features wasm --target wasm32-unknown-unknown --release
          cargo xtask wasm-size target/wasm32-unknown-unknown/release/rizzma.wasm --max-bytes "$WASM_SIZE_MAX_BYTES"

  # Proves the wasm-bindgen boundary end-to-end in a real (headless) browser:
  # build through the JS surface, render into a <canvas>, read pixels back,
  # and drive pan/zoom with synthetic DOM events. Kept out of the required
  # `fmt + clippy + test` gate so the fast path stays fast.
  wasm-test:
    name: wasm browser tests
    runs-on: ubuntu-latest
    env:
      WASM_PACK_VERSION: 0.15.0
    steps:
      - uses: actions/checkout@v4

      # rustup honors rust-toolchain.toml, installing the pinned stable
      # toolchain automatically.
      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version

      - uses: Swatinem/rust-cache@v2

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) target="x86_64-unknown-linux-musl" ;;
            aarch64|arm64) target="aarch64-unknown-linux-musl" ;;
            *) echo "unsupported wasm-pack host architecture: $arch" >&2; exit 1 ;;
          esac
          curl -sL -o /tmp/wasm-pack.tgz "https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-${target}.tar.gz"
          tar xzf /tmp/wasm-pack.tgz -C /tmp
          sudo mv "/tmp/wasm-pack-v${WASM_PACK_VERSION}-${target}/wasm-pack" /usr/local/bin/
          wasm-pack --version

      - name: Run headless Chrome tests
        run: wasm-pack test --headless --chrome crates/rizzma --test wasm_browser
