name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustup honors rust-toolchain.toml, installing the pinned stable
      # (channel + rustfmt/clippy components) automatically.
      - name: Show toolchain
        run: |
          rustup show active-toolchain
          cargo --version

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Test
        run: cargo test --workspace --all-features

      # Doc consistency: render the gallery, then verify every `gallery_*.png`
      # referenced in the README / doc comments is actually produced by the
      # gallery example (catches typo'd or stale image URLs).
      - name: Render gallery
        run: cargo run -p rizzma-figure --example gallery

      - name: Check gallery doc links
        run: cargo xtask check-gallery-links --strict

      # Broken intra-doc links (and other rustdoc warnings) fail the build.
      - name: Docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
