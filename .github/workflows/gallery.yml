name: Gallery

# Renders the example gallery and publishes the PNGs to an orphan `gh-pages`
# branch. `force_orphan: true` keeps that branch a single, ever-fresh commit, so
# the rendered images never accumulate in any tree's history — `main` stays pure
# source, and the images are servable from raw.githubusercontent.com.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gallery
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Render gallery
        run: cargo run -p rizzma-figure --example gallery

      - name: Assemble site
        run: |
          mkdir -p gallery-out
          cp target/gallery_*.png gallery-out/
          {
            echo '<!doctype html><meta charset="utf-8"><title>rizzma gallery</title>'
            echo '<style>body{font-family:system-ui;background:#1a1b26;color:#c0caf5;max-width:1100px;margin:2rem auto}figure{display:inline-block;margin:12px}img{width:480px;border:1px solid #565f89;border-radius:6px}figcaption{text-align:center}</style>'
            echo '<h1>rizzma gallery</h1>'
            echo '<p>Auto-rendered from <code>crates/rizzma-figure/examples/gallery.rs</code> on every push to <code>main</code>.</p>'
            for f in gallery-out/*.png; do
              n=$(basename "$f")
              t=${n#gallery_}; t=${t%.png}
              echo "<figure><img src=\"$n\" alt=\"$t\"><figcaption>$t</figcaption></figure>"
            done
          } > gallery-out/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gallery-out
          publish_branch: gh-pages
          force_orphan: true
