name: Gallery

# Renders the example gallery and publishes the PNGs to an orphan `gh-pages`
# branch. `force_orphan: true` keeps that branch a single, ever-fresh commit, so
# the rendered images never accumulate in any tree's history — `main` stays pure
# source, and the images are servable from raw.githubusercontent.com.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gallery
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Render gallery
        run: cargo run -p rizzma --example gallery

      - name: Assemble site
        run: |
          mkdir -p gallery-out
          cp target/gallery_*.png gallery-out/
          {
            echo '<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>rizzma gallery</title>'
            # Responsive grid: images fill their track (100% width), tracks are
            # ~800px on desktop and collapse to a single full-width column on
            # mobile via auto-fill + minmax.
            echo '<style>body{font-family:system-ui;background:#1a1b26;color:#c0caf5;max-width:1640px;margin:2rem auto;padding:0 12px}main{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(800px,100%),1fr));gap:16px}figure{margin:0}img{width:100%;height:auto;display:block;border:1px solid #565f89;border-radius:6px;background:#fff}figcaption{text-align:center;padding:4px 0 0;font-size:0.9rem;opacity:0.85}</style>'
            echo '<h1>rizzma gallery</h1>'
            echo '<p>Auto-rendered from <code>crates/rizzma/examples/gallery.rs</code> on every push to <code>main</code>.</p>'
            echo '<main>'
            for f in gallery-out/*.png; do
              n=$(basename "$f")
              t=${n#gallery_}; t=${t%.png}
              echo "<figure><img src=\"$n\" alt=\"$t\" loading=\"lazy\"><figcaption>$t</figcaption></figure>"
            done
            echo '</main>'
          } > gallery-out/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gallery-out
          publish_branch: gh-pages
          force_orphan: true
