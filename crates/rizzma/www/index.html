<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rizzma interactive demo</title>
    <style>
      body {
        background: #1a1b26;
        color: #c0caf5;
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      canvas {
        background: #fff;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        touch-action: none; /* pointer events drive pan; no browser gestures */
      }
      .caption {
        font-size: 0.9rem;
        opacity: 0.8;
        max-width: 42rem;
        text-align: center;
      }
      #readout {
        font-family: ui-monospace, monospace;
        font-size: 1rem;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <canvas id="plot"></canvas>
    <p id="readout">&mdash;</p>
    <button id="live">start live updates</button>
    <p class="caption">
      Built from JS data via <code>WasmFigure</code>, rendered HiDPI-crisp by
      <code>rizzma</code> (tiny-skia &rarr; ImageData), interactive via
      <code>WasmSession</code>: scroll to zoom at the cursor, drag to pan,
      double-click to reset, hover for coordinates.
    </p>
    <script type="module">
      import init, { WasmFigure } from "./pkg/rizzma.js";
      await init();

      // Build the plot from JS data — no baked-in sample.
      const n = 400;
      const xs = new Float64Array(n);
      const damped = new Float64Array(n);
      const envelope = new Float64Array(n);
      for (let i = 0; i < n; i++) {
        const x = (12 * i) / (n - 1);
        xs[i] = x;
        envelope[i] = Math.exp(-x / 4);
        damped[i] = envelope[i] * Math.cos(2 * x);
      }

      const fig = new WasmFigure(6.4, 4.8);
      const ax = fig.add_axes(0.12, 0.12, 0.83, 0.78);
      fig.plot(ax, xs, damped);
      fig.plot_styled(ax, xs, envelope, { color: "tab:orange", ls: "--", lw: 1.0 });
      fig.set_title(ax, "damped oscillation");
      fig.set_xlabel(ax, "t");
      fig.set_ylabel(ax, "amplitude");
      fig.legend(ax, ["exp(-t/4)·cos(2t)", "envelope"]);

      // Bind consumes the figure and wires up zoom/pan/reset/hover.
      const session = fig.bind("plot");
      const readout = document.getElementById("readout");
      session.on_hover((axes, x, y) => {
        readout.textContent =
          axes === null ? "—" : `x=${x.toFixed(3)}, y=${y.toFixed(3)}`;
      });

      // Live updates: animate the damped oscillation's phase through
      // session.set_line_data — repaints are rAF-coalesced in Rust, and a
      // panned/zoomed view is preserved across updates.
      const liveBtn = document.getElementById("live");
      let timer = null;
      let phase = 0;
      liveBtn.addEventListener("click", () => {
        if (timer !== null) {
          clearInterval(timer);
          timer = null;
          liveBtn.textContent = "start live updates";
          return;
        }
        timer = setInterval(() => {
          phase += 0.12;
          const moving = new Float64Array(n);
          for (let i = 0; i < n; i++) {
            moving[i] = envelope[i] * Math.cos(2 * xs[i] + phase);
          }
          session.set_line_data(ax, 0, xs, moving);
        }, 100);
        liveBtn.textContent = "stop live updates";
      });
    </script>
  </body>
</html>
